# LambdaTest HyperExecute configuration
# Generated by Qlitz Framework Generator
# Docs: https://www.lambdatest.com/support/docs/getting-started-with-hyperexecute/

version: 0.1
globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

runson: win
autosplit: true
retryOnFailure: false
maxRetries: 1

concurrency: 5

env:
  BASE_URL: "{{BASE_URL}}"
  BROWSER: "{{BROWSER}}"
  LT_USERNAME: "$LT_USERNAME"
  LT_ACCESS_KEY: "$LT_ACCESS_KEY"

pre:
  - mvn dependency:resolve -B

testDiscovery:
  type: raw
  mode: dynamic
  command: grep -rn @Test src/test/java/{{BASE_PACKAGE_PATH}}/tests/ | awk '{print $1}' | sed 's/:.*//'

testRunnerCommand: mvn test -Dtest=$test -DbaseUrl=$BASE_URL -Dbrowser=$BROWSER
