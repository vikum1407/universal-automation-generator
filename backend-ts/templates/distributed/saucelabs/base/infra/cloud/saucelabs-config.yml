# Sauce Labs configuration
# Generated by Qlitz Framework Generator
# Docs: https://docs.saucelabs.com/

apiVersion: v1alpha
kind: sauce
defaults:
  timeout: 10m

sauce:
  region: us-west-1
  concurrency: 3
  metadata:
    name: {{PROJECT_NAME}}
    tags:
      - {{FRAMEWORK}}
      - {{LANGUAGE}}
      - generated

suites:
  - name: "{{PROJECT_NAME}} — Chrome"
    env:
      BASE_URL: "{{BASE_URL}}"
      BROWSER: chrome
    testOptions:
      paths:
        - src/test/java/{{BASE_PACKAGE_PATH}}/tests/

artifacts:
  retain:
    when: always
    match:
      - allure-results/**
    directory: ./artifacts
