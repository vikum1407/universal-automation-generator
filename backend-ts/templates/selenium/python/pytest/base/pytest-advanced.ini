[pytest]
# {{PROJECT_NAME}} — advanced pytest configuration with parallel execution
# Framework: {{FRAMEWORK}} | Language: {{LANGUAGE}}
# Generated by Qlitz Framework Generator

testpaths = tests
addopts =
    -v
    --tb=short
    -n {{THREAD_COUNT}}
    --dist=loadfile
    --html=reports/report.html
    --self-contained-html

markers =
    smoke: Smoke test suite
    regression: Regression test suite
    flaky: Known-flaky tests
