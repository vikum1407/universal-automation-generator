# Generated by Qlitz Framework Generator
# {{PROJECT_NAME}} — Selenium Grid 4 + Docker Compose
#
# Usage:
#   docker compose up -d selenium-hub chrome-node firefox-node
#   docker compose run --rm test-runner
#   docker compose down

services:

  # ─── Selenium Grid Hub ───────────────────────────────────────────────────────
  selenium-hub:
    image: selenium/hub:4.18.1-20240402
    container_name: {{PROJECT_NAME}}-hub
    ports:
      - "{{GRID_HUB_PORT}}:4444"
      - "4442:4442"
      - "4443:4443"
    environment:
      SE_NODE_MAX_SESSIONS: "5"
      SE_SESSION_QUEUE_CAPACITY: "20"
      SE_SESSION_RETRY_INTERVAL: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4444/wd/hub/status | grep -q '\"ready\":true'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ─── Chrome nodes ────────────────────────────────────────────────────────────
  chrome-node:
    image: selenium/node-chrome:4.18.1-20240402
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: "4442"
      SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
      SE_NODE_MAX_SESSIONS: "3"
    volumes:
      - /dev/shm:/dev/shm
    deploy:
      replicas: {{GRID_NODE_COUNT}}

  # ─── Firefox nodes ───────────────────────────────────────────────────────────
  firefox-node:
    image: selenium/node-firefox:4.18.1-20240402
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: "4442"
      SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
      SE_NODE_MAX_SESSIONS: "3"
    volumes:
      - /dev/shm:/dev/shm

  # ─── Test runner ─────────────────────────────────────────────────────────────
  test-runner:
    image: {{DOCKER_IMAGE_NAME}}:{{DOCKER_IMAGE_TAG}}
    container_name: {{PROJECT_NAME}}-runner
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      GRID_URL: "{{GRID_HUB_URL}}"
      BASE_URL: "{{BASE_URL}}"
      BROWSER: "{{BROWSER}}"
      HEADLESS: "true"
      THREAD_COUNT: "{{THREAD_COUNT}}"
    volumes:
      - ./allure-results:/app/allure-results
      - ./test-output:/app/test-output
    profiles:
      - tests

networks:
  default:
    name: {{PROJECT_NAME}}-network
