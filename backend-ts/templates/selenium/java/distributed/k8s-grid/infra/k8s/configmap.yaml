apiVersion: v1
kind: ConfigMap
metadata:
  name: {{PROJECT_NAME}}-config
  namespace: {{K8S_NAMESPACE}}
  labels:
    app.kubernetes.io/managed-by: qlitz
data:
  BASE_URL:     "{{BASE_URL}}"
  BROWSER:      "{{BROWSER}}"
  HEADLESS:     "true"
  THREAD_COUNT: "{{THREAD_COUNT}}"
  GRID_URL:     "http://{{GRID_SERVICE_NAME}}:4444"
