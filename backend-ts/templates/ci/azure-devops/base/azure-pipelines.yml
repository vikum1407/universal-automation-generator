# {{PROJECT_NAME}} — Azure DevOps Pipeline
# Framework: {{FRAMEWORK}} | Language: {{LANGUAGE}}
# Generated by Qlitz Framework Generator

trigger:
  branches:
    include:
      - main
      - develop

schedules:
  - cron: '0 2 * * *'
    displayName: Nightly Run
    branches:
      include: [main]
    always: true

pool:
  vmImage: ubuntu-latest

variables:
  BASE_URL:  '{{BASE_URL}}'
  BROWSER:   '{{BROWSER}}'
  HEADLESS:  '{{HEADLESS}}'

stages:
  - stage: Test
    displayName: Run Tests
    jobs:
      - job: RunTests
        displayName: '{{PROJECT_NAME}} Tests'
        timeoutInMinutes: 30

        steps:
          # ── Java / Maven ────────────────────────────────────────────────────
          - task: JavaToolInstaller@0
            condition: eq('{{LANGUAGE}}', 'java')
            displayName: Install JDK 17
            inputs:
              versionSpec: '17'
              jdkArchitectureOption: x64
              jdkSourceOption: PreInstalled

          - script: mvn test -B
            condition: eq('{{LANGUAGE}}', 'java')
            displayName: Maven test
            env:
              BASE_URL: $(BASE_URL)

          - task: PublishTestResults@2
            condition: and(always(), eq('{{LANGUAGE}}', 'java'))
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: 'target/surefire-reports/TEST-*.xml'
              failTaskOnFailedTests: true

          # ── TypeScript / Node ───────────────────────────────────────────────
          - task: NodeTool@0
            condition: or(eq('{{LANGUAGE}}', 'typescript'), eq('{{LANGUAGE}}', 'javascript'))
            displayName: Install Node.js 20
            inputs:
              versionSpec: '20.x'

          - script: npm ci && npm test
            condition: or(eq('{{LANGUAGE}}', 'typescript'), eq('{{LANGUAGE}}', 'javascript'))
            displayName: npm test
            env:
              BASE_URL: $(BASE_URL)

          # ── Python ──────────────────────────────────────────────────────────
          - task: UsePythonVersion@0
            condition: eq('{{LANGUAGE}}', 'python')
            displayName: Install Python 3.11
            inputs:
              versionSpec: '3.11'

          - script: |
              pip install -r requirements.txt
              pytest --tb=short -v --junitxml=reports/test-results.xml
            condition: eq('{{LANGUAGE}}', 'python')
            displayName: pytest
            env:
              BASE_URL: $(BASE_URL)

          - task: PublishTestResults@2
            condition: and(always(), eq('{{LANGUAGE}}', 'python'))
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: 'reports/test-results.xml'
              failTaskOnFailedTests: true

          # ── Artifacts ───────────────────────────────────────────────────────
          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)
              artifactName: TestResults
