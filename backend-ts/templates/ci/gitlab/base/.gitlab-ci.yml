# {{PROJECT_NAME}} — GitLab CI/CD Pipeline
# Framework: {{FRAMEWORK}} | Language: {{LANGUAGE}}
# Generated by Qlitz Framework Generator

stages:
  - install
  - test
  - report

variables:
  BASE_URL:  "{{BASE_URL}}"
  BROWSER:   "{{BROWSER}}"
  HEADLESS:  "{{HEADLESS}}"

# ── Install ───────────────────────────────────────────────────────────────────

install:java:
  stage: install
  image: maven:3.9-eclipse-temurin-17
  rules:
    - if: '"{{LANGUAGE}}" == "java"'
  script:
    - mvn dependency:resolve -q
  cache:
    key: maven-$CI_COMMIT_REF_SLUG
    paths:
      - .m2/repository/

install:node:
  stage: install
  image: node:20-slim
  rules:
    - if: '"{{LANGUAGE}}" == "typescript" || "{{LANGUAGE}}" == "javascript"'
  script:
    - npm ci
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths:
      - node_modules/

install:python:
  stage: install
  image: python:3.11-slim
  rules:
    - if: '"{{LANGUAGE}}" == "python"'
  script:
    - pip install -r requirements.txt

# ── Test ──────────────────────────────────────────────────────────────────────

test:java:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  needs: [install:java]
  rules:
    - if: '"{{LANGUAGE}}" == "java"'
  script:
    - mvn test -B
  artifacts:
    when: always
    paths:
      - target/surefire-reports/
      - allure-results/
    reports:
      junit: target/surefire-reports/TEST-*.xml

test:node:
  stage: test
  image: mcr.microsoft.com/playwright:v1.44.0-jammy
  needs: [install:node]
  rules:
    - if: '"{{LANGUAGE}}" == "typescript" || "{{LANGUAGE}}" == "javascript"'
  script:
    - npm test
  artifacts:
    when: always
    paths:
      - playwright-report/
      - allure-results/

test:python:
  stage: test
  image: python:3.11-slim
  needs: [install:python]
  rules:
    - if: '"{{LANGUAGE}}" == "python"'
  script:
    - pytest --tb=short -v --junitxml=reports/test-results.xml
  artifacts:
    when: always
    paths:
      - reports/
    reports:
      junit: reports/test-results.xml
