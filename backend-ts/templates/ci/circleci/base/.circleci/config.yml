# {{PROJECT_NAME}} — CircleCI Pipeline
# Framework: {{FRAMEWORK}} | Language: {{LANGUAGE}}
# Generated by Qlitz Framework Generator

version: 2.1

orbs:
  node:   circleci/node@5
  maven:  circleci/maven@1
  python: circleci/python@2

executors:
  java-executor:
    docker:
      - image: cimg/openjdk:17.0
  node-executor:
    docker:
      - image: cimg/node:20.0
  python-executor:
    docker:
      - image: cimg/python:3.11

jobs:
  test-java:
    executor: java-executor
    steps:
      - checkout
      - restore_cache:
          keys: [maven-deps-{{ checksum "pom.xml" }}]
      - run:
          name: Run Maven tests
          command: mvn test -B
          environment:
            BASE_URL: "{{BASE_URL}}"
      - save_cache:
          paths: [~/.m2]
          key: maven-deps-{{ checksum "pom.xml" }}
      - store_test_results:
          path: target/surefire-reports
      - store_artifacts:
          path: target/surefire-reports
      - store_artifacts:
          path: allure-results

  test-node:
    executor: node-executor
    parallelism: {{THREAD_COUNT}}
    steps:
      - checkout
      - node/install-packages
      - run:
          name: Run tests
          command: npm test
          environment:
            BASE_URL: "{{BASE_URL}}"
      - store_artifacts:
          path: playwright-report
      - store_artifacts:
          path: allure-results

  test-python:
    executor: python-executor
    steps:
      - checkout
      - python/install-packages:
          pkg-manager: pip
          pip-dependency-file: requirements.txt
      - run:
          name: Run pytest
          command: pytest --tb=short -v --junitxml=reports/test-results.xml
          environment:
            BASE_URL: "{{BASE_URL}}"
      - store_test_results:
          path: reports
      - store_artifacts:
          path: reports

workflows:
  test:
    jobs:
      - test-java:
          filters:
            branches:
              only: [main, develop]
      - test-node:
          filters:
            branches:
              only: [main, develop]
      - test-python:
          filters:
            branches:
              only: [main, develop]
