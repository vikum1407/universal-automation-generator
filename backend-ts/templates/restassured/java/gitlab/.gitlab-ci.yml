# {{PROJECT_NAME}} — GitLab CI/CD Pipeline
# Framework: REST Assured + Java  |  Coverage: {{COVERAGE_LEVEL}}
# Generated by Qlitz Framework Generator

stages:
  - test
  - report

variables:
  API_BASE_URL:   "{{API_BASE_URL}}"
  COVERAGE_LEVEL: "{{COVERAGE_LEVEL}}"
  MAVEN_OPTS:     "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Xmx1g"

api-tests:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn clean test -B
      -Dapi.base.url="$API_BASE_URL"
      -Dapi.auth.token="$API_AUTH_TOKEN"
      -Dcoverage.level="$COVERAGE_LEVEL"
      --no-transfer-progress
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository/
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - target/allure-results/
      - target/surefire-reports/
    reports:
      junit: target/surefire-reports/TEST-*.xml
  variables:
    API_AUTH_TOKEN: ""   # inject via GitLab CI/CD Variables (masked)
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
