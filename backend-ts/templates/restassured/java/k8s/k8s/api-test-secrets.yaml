# {{PROJECT_NAME}} — K8s Secret for API test credentials
# Fill in real values before applying. Use base64 encoding:
#   echo -n "https://api.example.com" | base64
#
# Apply: kubectl apply -f k8s/api-test-secrets.yaml -n {{K8S_NAMESPACE}}

apiVersion: v1
kind: Secret
metadata:
  name: api-test-secrets
  namespace: {{K8S_NAMESPACE}}
type: Opaque
stringData:
  api-base-url:   "{{API_BASE_URL}}"
  api-auth-token: ""   # inject real token before applying
