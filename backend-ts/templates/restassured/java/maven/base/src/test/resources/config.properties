# ─── Qlitz API Test Suite — Runtime Configuration ────────────────────────────
#
# Every property here can be overridden at runtime with a JVM system property:
#   mvn test -Dapi.base.url=https://staging.example.com -Dapi.auth.token=my-token
#
# In Docker / K8s: set environment variables or pass -D flags via the entrypoint.
# The framework reads JVM properties first, then falls back to values below.

# ─── Target API ───────────────────────────────────────────────────────────────
api.base.url={{API_BASE_URL}}

# ─── Authentication ───────────────────────────────────────────────────────────
# Bearer token — replace with your token or inject via CI/CD pipeline.
# Leave blank to run without auth headers (e.g. for public APIs).
api.auth.token=

# ─── Coverage ─────────────────────────────────────────────────────────────────
coverage.level={{COVERAGE_LEVEL}}

# ─── Retry ────────────────────────────────────────────────────────────────────
# Number of times a failed test is retried before marking as FAILED.
test.retry.count=1

# ─── Timeouts (milliseconds) ──────────────────────────────────────────────────
http.connect.timeout=10000
http.read.timeout=30000
