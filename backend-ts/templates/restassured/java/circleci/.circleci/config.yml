# {{PROJECT_NAME}} — CircleCI Pipeline
# Framework: REST Assured + Java  |  Coverage: {{COVERAGE_LEVEL}}
# Generated by Qlitz Framework Generator

version: 2.1

orbs:
  maven: circleci/maven@1

jobs:
  api-tests:
    docker:
      - image: cimg/openjdk:17.0
    resource_class: medium
    steps:
      - checkout

      - restore_cache:
          keys:
            - maven-deps-{{ checksum "pom.xml" }}
            - maven-deps-

      - run:
          name: Run REST Assured API tests
          command: |
            mvn clean test -B \
              -Dapi.base.url="${API_BASE_URL:-{{API_BASE_URL}}}" \
              -Dapi.auth.token="${API_AUTH_TOKEN:-}" \
              -Dcoverage.level="${COVERAGE_LEVEL:-{{COVERAGE_LEVEL}}}" \
              --no-transfer-progress

      - save_cache:
          paths: [~/.m2]
          key: maven-deps-{{ checksum "pom.xml" }}

      - store_test_results:
          path: target/surefire-reports

      - store_artifacts:
          path: target/allure-results
          destination: allure-results

      - store_artifacts:
          path: target/surefire-reports
          destination: surefire-reports

workflows:
  api-test-workflow:
    jobs:
      - api-tests:
          filters:
            branches:
              only: [main, develop]
