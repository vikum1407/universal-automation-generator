# {{PROJECT_NAME}} — Azure DevOps Pipeline
# Framework: REST Assured + Java  |  Coverage: {{COVERAGE_LEVEL}}
# Generated by Qlitz Framework Generator

trigger:
  branches:
    include:
      - main
      - develop

schedules:
  - cron: '0 2 * * *'
    displayName: Nightly Run
    branches:
      include: [main]
    always: true

pool:
  vmImage: ubuntu-latest

variables:
  API_BASE_URL:   '{{API_BASE_URL}}'
  COVERAGE_LEVEL: '{{COVERAGE_LEVEL}}'
  MAVEN_OPTS:     '-Xmx1g'

stages:
  - stage: ApiTests
    displayName: REST Assured API Tests
    jobs:
      - job: RunApiTests
        displayName: '{{PROJECT_NAME}} — mvn clean test'
        timeoutInMinutes: 30

        steps:
          - task: JavaToolInstaller@0
            displayName: Install JDK 17
            inputs:
              versionSpec: '17'
              jdkArchitectureOption: x64
              jdkSourceOption: PreInstalled

          - script: |
              mvn clean test -B \
                -Dapi.base.url="$(API_BASE_URL)" \
                -Dapi.auth.token="$(API_AUTH_TOKEN)" \
                -Dcoverage.level="$(COVERAGE_LEVEL)" \
                --no-transfer-progress
            displayName: Run REST Assured tests
            env:
              API_AUTH_TOKEN: $(API_AUTH_TOKEN)

          - task: PublishTestResults@2
            condition: always()
            displayName: Publish Surefire results
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: 'target/surefire-reports/TEST-*.xml'
              failTaskOnFailedTests: true
              testRunTitle: '{{PROJECT_NAME}} API Tests'

          - task: PublishBuildArtifacts@1
            condition: always()
            displayName: Upload Allure results
            inputs:
              pathToPublish: target/allure-results
              artifactName: allure-results
