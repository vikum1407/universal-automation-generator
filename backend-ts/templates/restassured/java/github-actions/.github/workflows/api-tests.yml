name: {{PROJECT_NAME}} — API Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'   # nightly at 02:00 UTC

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run REST Assured API tests
        run: |
          mvn clean test -B \
            -Dapi.base.url="${API_BASE_URL}" \
            -Dapi.auth.token="${API_AUTH_TOKEN}" \
            -Dcoverage.level="${COVERAGE_LEVEL}" \
            --no-transfer-progress
        env:
          API_BASE_URL:   ${{ secrets.API_BASE_URL || '{{API_BASE_URL}}' }}
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN || '' }}
          COVERAGE_LEVEL: '{{COVERAGE_LEVEL}}'

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: target/allure-results/
          if-no-files-found: ignore

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.run_id }}
          path: target/surefire-reports/
          if-no-files-found: ignore
